name: Bug Report
description: Report a problem with the docs site
labels: ["bug"]
body:
  - type: input
    id: url
    attributes:
      label: Page URL
      description: Link to the affected page
      placeholder: https://docs.fmskinbuilder.com/...
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What's wrong?
      description: Describe the issue you encountered.
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      description: Which browser are you using?
      placeholder: e.g. Chrome 120, Firefox 121
    validations:
      required: false
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: Attach a screenshot if helpful.
    validations:
      required: false
