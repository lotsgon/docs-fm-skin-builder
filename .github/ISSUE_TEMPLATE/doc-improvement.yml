name: Documentation Improvement
description: Suggest an improvement to the docs
labels: ["docs"]
body:
  - type: input
    id: page
    attributes:
      label: Page affected
      description: Which page needs updating?
      placeholder: e.g. Getting Started > Installation
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What needs improving?
      description: Describe what's unclear, missing, or incorrect.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
      description: If you have a specific fix in mind, describe it here.
    validations:
      required: false
